services:
  lexbuild:
    build: .
    container_name: lexbuild
    restart: unless-stopped
    ports:
      - "3002:3000"
    env_file:
      - .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./knowledge:/app/knowledge:ro
# NOTE: MinIO removed — file storage is now PG bytea (Template/Peca/PecaUpload).
# After this deploy, the legacy `lexbuild-minio` container can be stopped/removed:
#   docker stop lexbuild-minio && docker rm lexbuild-minio
# Volume `lexbuild_minio-data` only needs removal once you confirm no demo files
# are needed there.
